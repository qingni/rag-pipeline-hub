# ============================================================
# 模型能力配置文件
# 用于智能模型推荐的模型能力评分
# ============================================================
# 
# 评分依据说明 (Score Reference Sources):
# 
# 1. MTEB 排行榜 (Massive Text Embedding Benchmark)
#    - 英文任务: https://huggingface.co/spaces/mteb/leaderboard
#    - 中文任务 (C-MTEB): https://huggingface.co/spaces/mteb/leaderboard
# 
# 2. 官方模型文档
#    - BGE-M3: https://huggingface.co/BAAI/bge-m3
#    - Qwen3-Embedding: https://huggingface.co/Alibaba-NLP/qwen3-embedding-8b
#    - Hunyuan-Embedding: 腾讯云官方文档
# 
# 3. 评分归一化规则
#    - 评分范围: 0.0 - 1.0 (对应 0% - 100%)
#    - 基准线: 0.50 = 基础可用水平
#    - 优秀线: 0.85+ = 该领域表现优秀
#    - 顶尖线: 0.95+ = 该领域顶尖水平
#
# 4. 最后更新: 2026-02-03
#    基于 MTEB 排行榜 2026年1月数据
# ============================================================

models:
  # ============================================================
  # BGE-M3 多语言模型
  # ============================================================
  # 评分依据:
  # - MTEB Retrieval (English): ~0.628 (排名 Top 15)
  # - C-MTEB Retrieval (Chinese): ~0.685 (排名 Top 10)
  # - 支持 100+ 语言，多语言能力突出
  # - 支持混合检索 (Dense + Sparse + ColBERT)
  # ============================================================
  bge-m3:
    name: "BGE-M3"
    provider: "bge"
    dimension: 1024
    max_sequence_length: 8192
    model_type: "text"
    description: "BGE-M3 多语言模型，支持密集检索、多向量检索和稀疏检索，100+语言支持"
    
    # 语言支持度评分 (基于多语言基准测试)
    # 参考: BGE-M3 Paper (https://arxiv.org/abs/2402.03216)
    language_scores:
      zh: 0.92  # 中文 - C-MTEB Retrieval 约 68.5%
      en: 0.88  # 英文 - MTEB Retrieval 约 62.8%
      ja: 0.85  # 日语 - 官方声称支持良好
      ko: 0.85  # 韩语 - 官方声称支持良好
      default: 0.78  # 其他语言 - 100+语言支持，平均水平
    
    # 领域专长评分 (基于通用训练数据分布)
    # BGE-M3 使用大规模网络数据训练，各领域均衡
    domain_scores:
      general: 0.88   # 通用领域 - 核心优势
      technical: 0.82 # 技术文档 - 较好
      legal: 0.75     # 法律合同 - 缺乏专项训练
      medical: 0.72   # 医疗健康 - 缺乏专项训练
      financial: 0.78 # 金融财经 - 一般
      academic: 0.85  # 学术论文 - 较好
      news: 0.86      # 新闻资讯 - 训练数据丰富
      default: 0.78   # 其他领域
    
    # 多模态能力评分
    multimodal_score: 0.0  # 不支持多模态
    
    # 性能指标 (1024维度，中等模型)
    performance:
      throughput: 0.85  # 吞吐量 - 维度适中，速度较快
      latency: 0.82     # 延迟表现
      cost: 0.88        # 成本效益 - 性价比高

  # ============================================================
  # 通义千问 Embedding 8B
  # ============================================================
  # 评分依据:
  # - MTEB Retrieval (English): ~0.61 (2025年数据)
  # - C-MTEB Retrieval (Chinese): ~0.72 (中文顶尖水平)
  # - 32K 超长上下文支持
  # - 动态维度输出 (64-4096)
  # ============================================================
  qwen3-embedding-8b:
    name: "Qwen3-Embedding-8B"
    provider: "qwen"
    dimension: 4096
    max_sequence_length: 32768
    model_type: "text"
    description: "通义千问 Embedding 8B，中文最优，32K超长上下文，动态维度输出"
    
    # 语言支持度评分
    # 参考: Qwen3 技术报告、C-MTEB 排行榜
    language_scores:
      zh: 0.96  # 中文 - C-MTEB 顶尖水平，约 72%+
      en: 0.88  # 英文 - MTEB 约 61%，与 BGE-M3 相近
      ja: 0.72  # 日语 - 有一定支持但非重点
      ko: 0.70  # 韩语 - 有一定支持但非重点
      default: 0.60  # 其他语言 - 主要针对中英优化
    
    # 领域专长评分
    # Qwen3 训练数据包含大量中文技术文档和专业文献
    domain_scores:
      general: 0.90   # 通用领域 - 优秀
      technical: 0.94 # 技术文档 - 核心优势，阿里技术积累
      legal: 0.82     # 法律合同 - 中文法律语料较丰富
      medical: 0.78   # 医疗健康 - 一般
      financial: 0.85 # 金融财经 - 较好
      academic: 0.88  # 学术论文 - 较好
      news: 0.85      # 新闻资讯 - 较好
      default: 0.82   # 其他领域
    
    multimodal_score: 0.0  # 不支持多模态
    
    # 性能指标 (8B 参数量较大)
    performance:
      throughput: 0.65  # 吞吐量 - 模型较大，速度偏慢
      latency: 0.60     # 延迟表现 - 需要GPU加速
      cost: 0.55        # 成本效益 - 计算成本较高

  # ============================================================
  # ============================================================
  # 通义千问多模态 Embedding 8B
  # ============================================================
  # 评分依据:
  # - Qwen-VL 系列技术报告
  # - 支持文本、图像、视频的统一嵌入
  # - 当前多模态 embedding 领域的领先方案
  # ============================================================
  qwen3-vl-embedding-8b:
    name: "Qwen3-VL-Embedding-8B"
    provider: "qwen"
    dimension: 4096
    min_dimension: 64
    max_dimension: 4096
    max_sequence_length: 32768
    model_type: "multimodal"
    description: "通义千问多模态 Embedding 8B，支持文本、图像、视频统一嵌入"
    
    # 语言支持度评分 (多模态场景下略低于纯文本模型)
    language_scores:
      zh: 0.92  # 中文 - 优秀
      en: 0.85  # 英文 - 较好
      ja: 0.68  # 日语 - 有限支持
      ko: 0.68  # 韩语 - 有限支持
      default: 0.55  # 其他语言
    
    # 领域专长评分 (多模态场景优化)
    domain_scores:
      general: 0.88   # 通用领域 - 较好
      technical: 0.85 # 技术文档 - 支持图文混合
      legal: 0.72     # 法律合同 - 一般
      medical: 0.85   # 医疗健康 - 支持医学影像
      financial: 0.78 # 金融财经 - 支持图表理解
      academic: 0.82  # 学术论文 - 支持图文论文
      news: 0.85      # 新闻资讯 - 支持图文新闻
      default: 0.78   # 其他领域
    
    # 多模态能力评分 (核心优势)
    multimodal_score: 0.95  # 顶尖多模态能力
    
    # 支持的输入类型
    supported_inputs:
      - text
      - image
      - video
      - text+image
    
    # 性能指标 (多模态处理较慢)
    performance:
      throughput: 0.50  # 吞吐量 - 多模态处理慢
      latency: 0.48     # 延迟表现 - 较慢
      cost: 0.45        # 成本效益 - 计算成本高

# ============================================================
# 推荐算法权重配置
# ============================================================
# 【业界最佳实践】采用二值判断 + 动态权重策略
# 参考: LlamaIndex, LangChain, Unstructured.io, OpenAI
# ============================================================
recommendation_weights:
  language_match: 0.40    # 语言匹配度权重
  domain_match: 0.35      # 领域匹配度权重
  multimodal_support: 0.25  # 多模态支持度权重（纯文本时）

# 多模态决策配置
multimodal_decision:
  table_threshold: 3
  weights_when_has_images:
    language: 0.25
    domain: 0.25
    multimodal: 0.50
  weights_when_has_tables:
    language: 0.35
    domain: 0.30
    multimodal: 0.35

# 异常检测配置
outlier_detection:
  default_threshold: 0.3
  min_threshold: 0.1
  max_threshold: 0.5

# 默认模型配置
default_model: "bge-m3"
default_multimodal_model: "qwen3-vl-embedding-8b"

<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540">
  <title>RAG Pipeline Flow</title>
  
  <defs>
    <!-- 流水线线条渐变 - 更新为新配色 -->
    <linearGradient id="line-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4A90E2" stop-opacity="0.3"/>
      <stop offset="20%" stop-color="#9B59B6"/>
      <stop offset="40%" stop-color="#E91E63"/>
      <stop offset="60%" stop-color="#F39C12"/>
      <stop offset="80%" stop-color="#27AE60"/>
      <stop offset="100%" stop-color="#667EEA" stop-opacity="0.3"/>
    </linearGradient>
    
    <!-- 图标背景渐变 -->
    <linearGradient id="icon-bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f8fafc" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#e2e8f0" stop-opacity="0.9"/>
    </linearGradient>
    
    <!-- 发光滤镜 -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    
    <!-- 阴影 -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#64748b" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <!-- 透明背景 -->
  
  <!-- 主连接线 (Pipeline) -->
  <path d="M 50 270 L 110 270 L 850 270 L 910 270" 
        fill="none" stroke="url(#line-gradient)" stroke-width="4" stroke-linecap="round"/>
        
  <!-- 动态光点 (示意数据流动) -->
  <circle cx="0" cy="270" r="4" fill="#9B59B6" filter="url(#glow)">
    <animate attributeName="cx" from="110" to="850" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;1;1;0" dur="3s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Node 1: 文档加载 - 亮蓝色 #4A90E2 -->
  <g transform="translate(110, 270)">
    <circle r="6" fill="#4A90E2" stroke="#ffffff" stroke-width="2"/>
    <g transform="translate(0, -60)">
      <rect x="-36" y="-36" width="72" height="72" rx="16" fill="url(#icon-bg)" stroke="#4A90E2" stroke-width="1.5" filter="url(#shadow)"/>
      <path d="M -12 -18 L 4 -18 L 12 -10 L 12 18 L -12 18 Z" fill="none" stroke="#4A90E2" stroke-width="2" stroke-linejoin="round"/>
      <path d="M 4 -18 L 4 -10 L 12 -10" fill="none" stroke="#4A90E2" stroke-width="2" stroke-linejoin="round"/>
      <line x1="-6" y1="0" x2="6" y2="0" stroke="#4A90E2" stroke-width="2" stroke-linecap="round"/>
      <line x1="-6" y1="8" x2="6" y2="8" stroke="#4A90E2" stroke-width="2" stroke-linecap="round"/>
    </g>
    <text y="60" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#4A90E2">文档加载</text>
    <text y="80" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#64748b">Loading</text>
  </g>

  <!-- Node 2: 文档分块 - 紫色 #9B59B6 -->
  <g transform="translate(258, 270)">
    <circle r="6" fill="#9B59B6" stroke="#ffffff" stroke-width="2"/>
    <g transform="translate(0, -60)">
      <rect x="-36" y="-36" width="72" height="72" rx="16" fill="url(#icon-bg)" stroke="#9B59B6" stroke-width="1.5" filter="url(#shadow)"/>
      <rect x="-14" y="-16" width="28" height="32" rx="2" fill="none" stroke="#9B59B6" stroke-width="2"/>
      <line x1="-18" y1="0" x2="18" y2="0" stroke="#9B59B6" stroke-width="2" stroke-dasharray="4,2"/>
    </g>
    <text y="60" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#9B59B6">文档分块</text>
    <text y="80" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#64748b">Chunking</text>
  </g>

  <!-- Node 3: 向量化 - 玫红色 #E91E63 -->
  <g transform="translate(406, 270)">
    <circle r="6" fill="#E91E63" stroke="#ffffff" stroke-width="2"/>
    <g transform="translate(0, -60)">
      <rect x="-36" y="-36" width="72" height="72" rx="16" fill="url(#icon-bg)" stroke="#E91E63" stroke-width="1.5" filter="url(#shadow)"/>
      <text x="0" y="-5" text-anchor="middle" font-family="monospace" font-size="10" fill="#E91E63" font-weight="bold">101</text>
      <text x="0" y="8" text-anchor="middle" font-family="monospace" font-size="10" fill="#E91E63" font-weight="bold">010</text>
      <rect x="-16" y="-16" width="32" height="32" rx="4" fill="none" stroke="#E91E63" stroke-width="1.5"/>
    </g>
    <text y="60" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#E91E63">向量化</text>
    <text y="80" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#64748b">Embedding</text>
  </g>

  <!-- Node 4: 向量索引 - 橙色 #F39C12 -->
  <g transform="translate(554, 270)">
    <circle r="6" fill="#F39C12" stroke="#ffffff" stroke-width="2"/>
    <g transform="translate(0, -60)">
      <rect x="-36" y="-36" width="72" height="72" rx="16" fill="url(#icon-bg)" stroke="#F39C12" stroke-width="1.5" filter="url(#shadow)"/>
      <ellipse cx="0" cy="-10" rx="14" ry="5" fill="none" stroke="#F39C12" stroke-width="2"/>
      <path d="M -14 -10 L -14 8 Q 0 16 14 8 L 14 -10" fill="none" stroke="#F39C12" stroke-width="2"/>
      <path d="M -14 0 Q 0 8 14 0" fill="none" stroke="#F39C12" stroke-width="2"/>
    </g>
    <text y="60" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#F39C12">向量索引</text>
    <text y="80" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#64748b">Indexing</text>
  </g>

  <!-- Node 5: 搜索查询 - 翠绿色 #27AE60 -->
  <g transform="translate(702, 270)">
    <circle r="6" fill="#27AE60" stroke="#ffffff" stroke-width="2"/>
    <g transform="translate(0, -60)">
      <rect x="-36" y="-36" width="72" height="72" rx="16" fill="url(#icon-bg)" stroke="#27AE60" stroke-width="1.5" filter="url(#shadow)"/>
      <circle cx="-2" cy="-2" r="9" fill="none" stroke="#27AE60" stroke-width="2"/>
      <line x1="6" y1="6" x2="12" y2="12" stroke="#27AE60" stroke-width="2" stroke-linecap="round"/>
    </g>
    <text y="60" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#27AE60">搜索查询</text>
    <text y="80" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#64748b">Retrieval</text>
  </g>

  <!-- Node 6: 文本生成 - 靛蓝色 #667EEA -->
  <g transform="translate(850, 270)">
    <circle r="6" fill="#667EEA" stroke="#ffffff" stroke-width="2"/>
    <g transform="translate(0, -60)">
      <rect x="-36" y="-36" width="72" height="72" rx="16" fill="url(#icon-bg)" stroke="#667EEA" stroke-width="1.5" filter="url(#shadow)"/>
      <path d="M -14 -4 Q -14 -16 0 -16 Q 14 -16 14 -4 Q 14 8 0 8 L -6 14 L -6 8 Q -14 8 -14 -4" fill="none" stroke="#667EEA" stroke-width="2" stroke-linejoin="round"/>
      <circle cx="-5" cy="-4" r="1.5" fill="#667EEA"/>
      <circle cx="5" cy="-4" r="1.5" fill="#667EEA"/>
    </g>
    <text y="60" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#667EEA">文本生成</text>
    <text y="80" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#64748b">Generation</text>
  </g>

  <!-- 箭头指示 - 更新颜色 -->
  <g transform="translate(0, -15)">
    <path d="M 184 270 L 194 270 M 190 266 L 194 270 L 190 274" stroke="#9B59B6" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.7"/>
    <path d="M 332 270 L 342 270 M 338 266 L 342 270 L 338 274" stroke="#E91E63" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.7"/>
    <path d="M 480 270 L 490 270 M 486 266 L 490 270 L 486 274" stroke="#F39C12" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.7"/>
    <path d="M 628 270 L 638 270 M 634 266 L 638 270 L 634 274" stroke="#27AE60" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.7"/>
    <path d="M 776 270 L 786 270 M 782 266 L 786 270 L 782 274" stroke="#667EEA" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.7"/>
  </g>

  <!-- 标题 -->
  <text x="40" y="50" font-family="system-ui, sans-serif" font-size="24" font-weight="700" fill="#1e293b">RAG Pipeline Hub</text>
  <text x="40" y="75" font-family="system-ui, sans-serif" font-size="14" fill="#64748b">End-to-End Processing Workflow</text>

</svg>

      type: object
      properties:
        status:
          type: string
          example: "success"
        data:
          type: object
          properties:
            added_count:
              type: integer
              description: 成功添加的向量数量
            failed_count:
              type: integer
              description: 失败的向量数量
            vector_ids:
              type: array
              description: 添加的向量ID列表
              items:
                type: string
                format: uuid
            errors:
              type: array
              description: 错误详情
              items:
                type: object
                properties:
                  index:
                    type: integer
                  error:
                    type: string
        timestamp:
          type: string
          format: date-time

    SearchResponse:
      type: object
      properties:
        status:
          type: string
          example: "success"
        data:
          type: object
          properties:
            results:
              type: array
              items:
                type: object
                properties:
                  vector_id:
                    type: string
                    format: uuid
                  score:
                    type: number
                    format: float
                    description: 相似度分数
                  document_id:
                    type: string
                  chunk_id:
                    type: string
                  text:
                    type: string
                  metadata:
                    type: object
                  namespace:
                    type: string
            query_time_ms:
              type: integer
              description: 查询耗时（毫秒）
        timestamp:
          type: string
          format: date-time

    BatchSearchResponse:
      type: object
      properties:
        status:
          type: string
          example: "success"
        data:
          type: object
          properties:
            results:
              type: array
              description: 每个查询的结果
              items:
                $ref: '#/components/schemas/SearchResponse/properties/data'
            total_query_time_ms:
              type: integer
        timestamp:
          type: string
          format: date-time

    StatisticsResponse:
      type: object
      properties:
        status:
          type: string
          example: "success"
        data:
          type: object
          properties:
            index_id:
              type: string
              format: uuid
            vector_count:
              type: integer
            index_size_bytes:
              type: integer
            avg_query_time_ms:
              type: number
              format: float
            query_count_total:
              type: integer
            query_count_24h:
              type: integer
            add_count_total:
              type: integer
            delete_count_total:
              type: integer
            memory_usage_bytes:
              type: integer
            last_query_at:
              type: string
              format: date-time
        timestamp:
          type: string
          format: date-time

    VectorResponse:
      type: object
      properties:
        status:
          type: string
          example: "success"
        data:
          type: object
          properties:
            id:
              type: string
              format: uuid
            vector_id:
              type: integer
            document_id:
              type: string
            chunk_id:
              type: string
            text:
              type: string
            metadata:
              type: object
            namespace:
              type: string
            created_at:
              type: string
              format: date-time
        timestamp:
          type: string
          format: date-time

    ExportResponse:
      type: object
      properties:
        status:
          type: string
          example: "success"
        data:
          type: object
          properties:
            export_path:
              type: string
            file_size_bytes:
              type: integer
            vector_count:
              type: integer
        timestamp:
          type: string
          format: date-time

    SuccessResponse:
      type: object
      properties:
        status:
          type: string
          example: "success"
        data:
          type: object
          properties:
            message:
              type: string
        timestamp:
          type: string
          format: date-time

    ErrorResponse:
      type: object
      properties:
        status:
          type: string
          example: "error"
        error:
          type: object
          properties:
            code:
              type: string
              description: 错误代码
              example: "INVALID_DIMENSION"
            message:
              type: string
              description: 错误消息
              example: "向量维度不匹配"
            details:
              type: object
              description: 错误详情
        timestamp:
          type: string
          format: date-time

  responses:
    BadRequest:
      description: 请求参数错误
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            status: "error"
            error:
              code: "INVALID_PARAMETER"
              message: "向量维度不匹配"
              details:
                expected: 1536
                received: 1024
            timestamp: "2025-12-22T10:00:00Z"

    NotFound:
      description: 资源不存在
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            status: "error"
            error:
              code: "INDEX_NOT_FOUND"
              message: "索引不存在"
            timestamp: "2025-12-22T10:00:00Z"

    InternalServerError:
      description: 服务器内部错误
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            status: "error"
            error:
              code: "INTERNAL_ERROR"
              message: "服务器内部错误"
            timestamp: "2025-12-22T10:00:00Z"

  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
      description: API密钥认证（未来扩展）

security:
  - ApiKeyAuth: []

version: '3.8'

services:
  docling-serve:
    image: quay.io/docling-project/docling-serve-cpu:latest
    container_name: docling-serve
    ports:
      - "5001:5001"
    environment:
      - UVICORN_HOST=0.0.0.0
      - UVICORN_PORT=5001
      - DOCLING_SERVE_ENABLE_UI=1
      - DOCLING_SERVE_LOAD_MODELS_AT_BOOT=true
      - EASYOCR_MODULE_PATH=/opt/app-root/src/.cache/docling/models/EasyOcr
      # 超时配置 - 适应大文件处理
      - DOCLING_SERVE_MAX_SYNC_WAIT=600          # 同步等待超时: 10分钟
      - DOCLING_SERVE_MAX_DOCUMENT_TIMEOUT=1800  # 文档处理超时: 30分钟
      - UVICORN_TIMEOUT_KEEP_ALIVE=300           # HTTP 连接保持: 5分钟
      # 结果保留配置 - 修复异步任务 404 问题
      - DOCLING_SERVE_SINGLE_USE_RESULTS=false   # 禁用一次性结果，允许多次获取
      - DOCLING_SERVE_RESULT_REMOVAL_DELAY=600   # 结果保留 10 分钟
      # 性能优化配置 - M3 Pro 36GB
      # 注意：UVICORN_WORKERS 必须为 1，否则多 Worker 无法共享结果
      - UVICORN_WORKERS=1                        # 单 Worker（多 Worker 会导致结果 404）
      - DOCLING_SERVE_ENG_LOC_NUM_WORKERS=4      # 内部处理线程数
      - OMP_NUM_THREADS=4                        # OpenMP 线程数
      - MKL_NUM_THREADS=4                        # MKL 线程数
      - NUMEXPR_MAX_THREADS=4                    # NumExpr 线程数
    volumes:
      # 容器内实际路径是 /opt/app-root/src/.cache
      - docling_cache:/opt/app-root/src/.cache
      - docling_models:/opt/app-root/src/.docling
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '6'           # 限制使用 6 核（留 2 核给系统）
          memory: 12G         # 增加到 12GB
        reservations:
          cpus: '4'           # 保证至少 4 核
          memory: 6G          # 保证至少 6GB

volumes:
  docling_cache:
    driver: local
  docling_models:
    driver: local
